<div class="control-section">
    <div class="content-wrapper">
        <ejs-schedule #scheduleObj width='100%' height='650px' [selectedDate]="selectedDate" [currentView]="currentView"
            [eventSettings]="eventSettings" [group]="group">
            <e-views>
                <e-view option="TimelineDay"></e-view>
                <e-view option="TimelineWeek"></e-view>
                <e-view option="TimelineMonth"></e-view>
            </e-views>
            <e-resources>
                <e-resource field="EmployeeId" title="Employee" name="Employees" [dataSource]="employeeDataSource"
                    [allowMultiple]="true" textField="Name" idField="Id" colorField="Color">
                </e-resource>
            </e-resources>
        </ejs-schedule>
    </div>
</div>
