<div class="card">
    <p-table [value]="employees" [scrollable]="true" scrollHeight="600px"
        styleClass="p-datatable-gridlines p-datatable-sm">
        <ng-template pTemplate="caption">
            <div class="flex align-items-center justify-content-between">
                Employee Unavailability
            </div>
        </ng-template>

        <ng-template pTemplate="header">
            <tr>
                <th pFrozenColumn style="min-width:200px">Employee</th>
                <ng-container *ngFor="let date of dates">
                    <th [attr.colspan]="48" style="text-align: center; border-left: 2px solid #ccc;">
                        {{ date | date:'fullDate' }}
                    </th>
                </ng-container>
            </tr>
            <tr>
                <th pFrozenColumn style="min-width:200px"></th> <!-- Spacer for employee column -->
                <th *ngFor="let col of timeSlots" style="min-width: 50px; text-align: center;">
                    {{ col.header }}
                </th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-employee>
            <tr>
                <td pFrozenColumn style="min-width:200px; font-weight: bold;">
                    {{ employee.name }} <br>
                    <small class="text-secondary">{{ employee.role }}</small>
                </td>
                <td *ngFor="let col of timeSlots" [ngClass]="getCellClass(employee, col)"
                    [pTooltip]="getUnavailabilityReasons(employee, col)" tooltipPosition="top"
                    style="min-width: 50px; padding: 0;">
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
