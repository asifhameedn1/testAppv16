<div class="control-section">
    <div class="content-wrapper">
        <div class="schedule-header">
            <h2>Daily Availability Dashboard</h2>
            <p>Visualizing employee schedules and unavailability blocks</p>
        </div>
        
        <ejs-schedule #scheduleObj width='100%' height='650px' 
            [selectedDate]="selectedDate" 
            [currentView]="currentView"
            [timeScale]="timeScale"
            [eventSettings]="eventSettings" 
            [group]="group"
            (eventRendered)="onEventRendered($event)"
            (popupOpen)="onPopupOpen($event)">
            
            <e-views>
                <e-view option="TimelineDay"></e-view>
            </e-views>
            
            <e-resources>
                <e-resource field="EmployeeId" title="Employee" name="Employees" 
                    [dataSource]="employeeDataSource"
                    [allowMultiple]="true" 
                    textField="Name" idField="Id" colorField="Color">
                </e-resource>
            </e-resources>

            <ng-template #eventTemplate let-data>
                <div class="template-wrap" [ngStyle]="getEventStyle(data)">
                    <div class="subject">{{data.Subject}}</div>
                </div>
            </ng-template>

        </ejs-schedule>
    </div>
</div>
